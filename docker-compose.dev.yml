services:
  # 仅构建 DiAgent service 镜像，不启动；Runtime Manager 动态管理容器
  diagent-build:
    build:
      context: ./DiAgent
      dockerfile: docker/agent-service/Dockerfile
    image: dios-diagent-service:latest
    profiles: ["build"]

  # task 模式镜像（含 git/curl），供一次性事件触发容器使用
  diagent-task-build:
    build:
      context: ./DiAgent
      dockerfile: docker/agent-task/Dockerfile
    image: dios-diagent-task:latest
    profiles: ["build"]

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
      - ./workspace:/workspace
      - dios-data:/data
    environment:
      - DIOS_WORKSPACE_ROOT=/workspace
      - DIOS_HOST_WORKSPACE_ROOT=${PWD}/workspace
      - DIOS_DATABASE_URL=sqlite+aiosqlite:////data/dios.db
      - DIOS_DIAGENT_IMAGE=dios-diagent-task:latest
      - DIOS_DIAGENT_SERVICE_IMAGE=dios-diagent-service:latest
      - DIOS_DOCKER_NETWORK=nana-os_default
    ports:
      - "8080:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    environment:
      - VITE_API_URL=http://backend:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  dios-data:
