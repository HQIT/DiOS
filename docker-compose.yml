version: "3.8"

services:
  backend:
    image: ghcr.io/hqit/dios/backend:main
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/workspace
      - dios-data:/data
    environment:
      - DIOS_WORKSPACE_ROOT=/workspace
      - DIOS_HOST_WORKSPACE_ROOT=${PWD}/workspace
      - DIOS_DATABASE_URL=sqlite+aiosqlite:////data/dios.db
      - DIOS_DIAGENT_IMAGE=ghcr.io/hqit/diagent/agent-task:latest
    ports:
      - "8000:8000"

  frontend:
    image: ghcr.io/hqit/dios/frontend:main
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  dios-data:
